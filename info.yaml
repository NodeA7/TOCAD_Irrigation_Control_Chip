# Tiny Tapeout project information
project:
  title:        "TOCAD Irrigation Chip"  # Project title
  author:       "Node_A7"     # Your name
  discord:      "ababras_samuel_21775"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "7-zone autonomous irrigation controller with priority arbiter (4 valves max), rain lockout, and 3-strike fault detection."
# One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_tocad_irrigation"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Zone 0 soil (1=DRY)"
  ui[1]: "Zone 1 soil (1=DRY)"
  ui[2]: "Zone 2 soil (1=DRY)"
  ui[3]: "Zone 3 soil (1=DRY)"
  ui[4]: "Zone 4 soil (1=DRY)"
  ui[5]: "Zone 5 soil (1=DRY)"
  ui[6]: "Zone 6 soil (1=DRY)"
  ui[7]: "Rain sensor (1=RAIN)"

  # Outputs
  uo[0]: "Valve 0 (1=OPEN)"
  uo[1]: "Valve 1 (1=OPEN)"
  uo[2]: "Valve 2 (1=OPEN)"
  uo[3]: "Valve 3 (1=OPEN)"
  uo[4]: "Valve 4 (1=OPEN)"
  uo[5]: "Valve 5 (1=OPEN)"
  uo[6]: "Valve 6 (1=OPEN)"
  uo[7]: "LED (1Hz=OK, 4Hz=FLT)"

  # Bidirectional pins
  uio[0]: "DFT Manual Trigger"
  uio[1]: "Freq Select Bit 0"
  uio[2]: "Freq Select Bit 1"
  uio[3]: "Freq Select Bit 2"
  uio[4]: "Dur Select Bit 0"
  uio[5]: "Dur Select Bit 1"
  uio[6]: "Dur Select Bit 2"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
